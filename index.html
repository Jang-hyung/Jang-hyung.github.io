<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>옞누의 오늘 뭐 먹지?</title>
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@400;700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #16161f;
    --accent: #ff6b35;
    --accent2: #ffd23f;
    --accent3: #06d6a0;
    --text: #f0eee8;
    --muted: #6b6b80;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { height: -webkit-fill-available; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    overflow-y: auto;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    animation: drift 12s ease-in-out infinite alternate;
    z-index: 0;
    pointer-events: none;
  }
  .blob1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; }
  .blob2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -6s; }
  .blob3 { width: 250px; height: 250px; background: var(--accent3); top: 50%; left: 60%; animation-delay: -3s; }
  @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.1); } }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    width: 100%;
    padding: 28px 24px;
    padding-top: max(28px, env(safe-area-inset-top));
    padding-bottom: max(28px, env(safe-area-inset-bottom));
  }

  h1 {
    font-family: 'Hahmlet', serif;
    font-size: clamp(1.7rem, 5vw, 3rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    text-align: center;
    line-height: 1.1;
  }
  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .roulette-wrap {
    position: relative;
    width: min(300px, 80vw);
    height: min(300px, 80vw);
    flex-shrink: 0;
  }

  .pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 28px solid var(--accent);
    filter: drop-shadow(0 0 8px var(--accent));
    z-index: 10;
    transition: opacity 0.3s;
  }

  canvas#wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    box-shadow:
      0 0 0 6px #1e1e2a,
      0 0 0 10px #2a2a3a,
      0 20px 60px rgba(0,0,0,0.6);
  }

  .empty-msg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    border-radius: 50%;
  }
  .empty-msg.show { opacity: 1; }
  .empty-msg .empty-icon { font-size: 2.2rem; }
  .empty-msg p { font-size: 0.75rem; color: var(--muted); text-align: center; line-height: 1.4; }

  .result-box {
    min-height: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .result-label {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .result-label.show { opacity: 1; }
  .result-text {
    font-family: 'Hahmlet', serif;
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    font-weight: 700;
    color: var(--accent2);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s cubic-bezier(.22,1,.36,1);
    text-align: center;
  }
  .result-text.show { opacity: 1; transform: translateY(0); }

  .spin-btn {
    background: var(--accent);
    color: #fff;
    font-family: 'Hahmlet', serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    border: none;
    padding: 14px 46px;
    border-radius: 100px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    box-shadow: 0 4px 24px rgba(255,107,53,0.4);
    -webkit-tap-highlight-color: transparent;
  }
  .spin-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  }
  .spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,107,53,0.5); }
  .spin-btn:active:not(:disabled) { transform: translateY(0); }
  .spin-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .chips {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 7px;
    max-width: 380px;
  }
  .chip {
    background: var(--surface);
    border: 1px solid #2a2a3a;
    border-radius: 100px;
    padding: 6px 13px;
    font-size: 0.76rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .chip.active.kor { color: #ff6b35; border-color: #ff6b35; background: rgba(255,107,53,0.08); }
  .chip.active.chi { color: #ff4d6d; border-color: #ff4d6d; background: rgba(255,77,109,0.08); }
  .chip.active.jpn { color: #06d6a0; border-color: #06d6a0; background: rgba(6,214,160,0.08); }
  .chip.active.wst { color: #ffd23f; border-color: #ffd23f; background: rgba(255,210,63,0.08); }
  .chip.active.etc { color: #c77dff; border-color: #c77dff; background: rgba(199,125,255,0.08); }

  @keyframes confettiFly {
    0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); opacity: 0; }
  }
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 999;
    animation: confettiFly 0.9s ease-out forwards;
  }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="container">
  <div style="text-align:center">
    <p class="subtitle">옞누의</p>
    <h1>오늘 <span>뭐 먹지?</span></h1>
  </div>

  <div class="chips" id="chips">
    <div class="chip kor active" data-cat="kor">🍚 한식</div>
    <div class="chip chi active" data-cat="chi">🥢 중식</div>
    <div class="chip jpn active" data-cat="jpn">🍣 일식</div>
    <div class="chip wst active" data-cat="wst">🍝 양식</div>
    <div class="chip etc active" data-cat="etc">🌍 기타</div>
  </div>

  <div class="roulette-wrap">
    <div class="pointer" id="pointer"></div>
    <canvas id="wheel"></canvas>
    <div class="empty-msg" id="emptyMsg">
      <div class="empty-icon">🍽️</div>
      <p>카테고리를<br>선택해주세요</p>
    </div>
  </div>

  <div class="result-box">
    <p class="result-label" id="resultLabel">오늘의 메뉴</p>
    <p class="result-text" id="resultText"></p>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">🎰 돌려!</button>
</div>

<script>
const MENUS = {
  kor: ['된장찌개','삼겹살','볶음밥','김치찌개','칼국수','순두부찌개','갈비탕','냉면','삼계탕','제육볶음','떡볶이','국밥','닭도리탕','찜닭','모듬전','모듬회', '족발보쌈', '알탕', '부대찌개'],
  chi: ['짜장면','짬뽕','탕수육','마라탕','마파두부','깐풍기','볶음밥','딤섬','훠궈','꿔바로우','양꼬치','마라샹궈'],
  jpn: ['스시','라멘','우동','돈카츠','꼬치','규동','나베','타꼬야키','오니기리','오코노미야끼','소바','야끼소바', '덮밥'],
  wst: ['파스타','피자','스테이크','버거','리조또','샐러드','브런치','연어스테이크','토스트','치킨', '샌드위치'],
  etc: ['반미','쌀국수','포케','팟타이','케밥','인도커리','나시고렝','분짜','월남쌈','커리','타코','미트파이','그냥 넌 굶어라'],
};

const COLORS = {
  kor: ['#ff6b35','#ff8c5a','#ff5722','#e64a19','#ff7043','#f4511e'],
  chi: ['#ff4d6d','#ff6b6b','#e53935','#c62828','#ef5350','#d32f2f'],
  jpn: ['#06d6a0','#00bfa5','#1de9b6','#00e5ff','#26c6da','#00acc1'],
  wst: ['#ffd23f','#ffca28','#ffc107','#ffb300','#ffa000','#ff8f00'],
  etc: ['#c77dff','#b56bff','#9d4edd','#7b2fff','#a855f7','#8b5cf6'],
};

let spinning = false;
let currentAngle = 0;
let activeCategories = ['kor','chi','jpn','wst','etc'];
let segments = [];

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const pointerEl = document.getElementById('pointer');
const emptyMsg = document.getElementById('emptyMsg');
const spinBtn = document.getElementById('spinBtn');

function buildSegments() {
  segments = [];
  activeCategories.forEach(cat => {
    MENUS[cat].forEach((name, i) => {
      segments.push({ name, color: COLORS[cat][i % COLORS[cat].length], cat });
    });
  });
  for (let i = segments.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [segments[i], segments[j]] = [segments[j], segments[i]];
  }
}

function drawWheel(angle) {
  const size = canvas.width;
  const cx = size / 2, cy = size / 2, r = size / 2 - 4;
  const n = segments.length;
  ctx.clearRect(0, 0, size, size);

  if (n === 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    ctx.fillStyle = '#1a1a26';
    ctx.fill();
    ctx.strokeStyle = '#2a2a3a';
    ctx.lineWidth = 2;
    ctx.stroke();
    emptyMsg.classList.add('show');
    pointerEl.style.opacity = '0.2';
    spinBtn.disabled = true;
    return;
  }

  emptyMsg.classList.remove('show');
  pointerEl.style.opacity = '1';
  spinBtn.disabled = false;

  const arc = (2 * Math.PI) / n;

  segments.forEach((seg, i) => {
    const start = angle + i * arc;
    const end = start + arc;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.font = `bold ${Math.max(8, Math.min(13, 280/n))}px 'Noto Sans KR', sans-serif`;
    ctx.fillText(seg.name, r - 10, 4);
    ctx.restore();
  });

  ctx.beginPath();
  ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
  ctx.fillStyle = '#0d0d14';
  ctx.fill();
  ctx.strokeStyle = '#2a2a3a';
  ctx.lineWidth = 3;
  ctx.stroke();
}

function resize() {
  const w = canvas.parentElement.offsetWidth;
  canvas.width = w;
  canvas.height = w;
  drawWheel(currentAngle);
}

function getResult(angle) {
  const n = segments.length;
  if (n === 0) return null;
  const arc = (2 * Math.PI) / n;
  const pointer = -Math.PI / 2;
  for (let i = 0; i < n; i++) {
    let start = ((angle + i * arc) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
    let end   = ((angle + (i+1) * arc) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
    let p     = (pointer % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
    if (start <= end ? (p >= start && p < end) : (p >= start || p < end)) {
      return segments[i];
    }
  }
  return segments[0];
}

function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

function spin() {
  if (spinning || segments.length === 0) return;
  spinning = true;
  spinBtn.disabled = true;

  document.getElementById('resultLabel').classList.remove('show');
  document.getElementById('resultText').classList.remove('show');

  const extraSpins = 6 + Math.random() * 4;
  const targetAngle = currentAngle + extraSpins * 2 * Math.PI;
  const duration = 3500;
  const startTime = performance.now();
  const startAngle = currentAngle;

  function frame(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + (targetAngle - startAngle) * easeOut(t);
    drawWheel(currentAngle);

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      currentAngle = targetAngle % (2 * Math.PI);
      drawWheel(currentAngle);
      spinning = false;
      if (segments.length > 0) spinBtn.disabled = false;

      const result = getResult(currentAngle);
      if (result) {
        document.getElementById('resultLabel').classList.add('show');
        document.getElementById('resultText').textContent = result.name;
        setTimeout(() => document.getElementById('resultText').classList.add('show'), 50);
        burst();
      }
    }
  }
  requestAnimationFrame(frame);
}

function burst() {
  const colors = ['#ff6b35','#ffd23f','#06d6a0','#ff4d6d','#c77dff','#fff'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = '50%';
    el.style.top = '44%';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.setProperty('--tx', ((Math.random() - 0.5) * 300) + 'px');
    el.style.setProperty('--ty', ((Math.random() - 1.2) * 250) + 'px');
    el.style.setProperty('--tr', (Math.random() * 720 - 360) + 'deg');
    el.style.animationDelay = Math.random() * 0.3 + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }
}

document.getElementById('chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip || spinning) return;
  const cat = chip.dataset.cat;

  if (activeCategories.includes(cat)) {
    activeCategories = activeCategories.filter(c => c !== cat);
    chip.classList.remove('active');
  } else {
    activeCategories.push(cat);
    chip.classList.add('active');
  }

  buildSegments();
  drawWheel(currentAngle);
  document.getElementById('resultText').classList.remove('show');
  document.getElementById('resultLabel').classList.remove('show');
});

buildSegments();
window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
